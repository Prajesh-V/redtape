services:
  - type: web
    name: redtape-backend
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerContext: ./backend
    envVars:
      - key: NVIDIA_API_KEY
        sync: false          # Set this manually in the Render dashboard
      - key: FRONTEND_URL
        sync: false          # Set to your Vercel URL e.g. https://your-app.vercel.app
    healthCheckPath: /
    autoDeploy: true
